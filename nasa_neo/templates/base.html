<!DOCTYPE html>
<html lang="it" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}NASA NEO Monitor{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            mono: ['"Space Mono"', 'monospace'],
            display: ['"Bebas Neue"', 'sans-serif'],
          },
          colors: {
            void: '#050508',
            cosmos: '#0a0a12',
            nebula: '#12121e',
            pulse: '#00ff88',
            hazard: '#ff3366',
            dim: '#8888aa',
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-8px)' },
            }
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/custom.css' %}">
  <style>
    body { font-family: 'Space Mono', monospace; }
    .font-display { font-family: 'Bebas Neue', sans-serif; }
    .scanline {
      background: repeating-linear-gradient(
        0deg, transparent, transparent 2px,
        rgba(0,255,136,0.015) 2px, rgba(0,255,136,0.015) 4px
      );
      pointer-events: none;
    }
    .glow-pulse { box-shadow: 0 0 20px rgba(0,255,136,0.3), 0 0 60px rgba(0,255,136,0.1); }
    .glow-hazard { box-shadow: 0 0 20px rgba(255,51,102,0.4), 0 0 60px rgba(255,51,102,0.15); }
    .grid-bg {
      background-image:
        linear-gradient(rgba(0,255,136,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,136,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
  </style>
</head>
<body class="bg-void text-white min-h-screen grid-bg">
  <!-- Scanline overlay -->
  <div class="fixed inset-0 scanline z-50 pointer-events-none"></div>

  <header class="border-b border-pulse/20 bg-cosmos/80 backdrop-blur-sm sticky top-0 z-40">
    <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
      <a href="{% url 'core:dashboard' %}" class="flex items-center gap-3 group">
        <div class="w-8 h-8 rounded-full bg-pulse/20 border border-pulse/50 flex items-center justify-center group-hover:glow-pulse transition-all">
          <div class="w-3 h-3 rounded-full bg-pulse animate-pulse-slow"></div>
        </div>
        <span class="font-display text-2xl tracking-widest text-pulse">NASA NEO</span>
        <span class="text-dim text-xs tracking-widest hidden sm:block">NEAR EARTH OBJECT MONITOR</span>
      </a>
      <div class="flex items-center gap-2 text-xs text-dim font-mono">
        <div class="w-2 h-2 rounded-full bg-pulse animate-pulse"></div>
        <span>LIVE</span>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <footer class="border-t border-white/5 mt-16">
    <div class="max-w-7xl mx-auto px-6 py-6 text-center text-dim text-xs tracking-widest">
      POWERED BY NASA NEOWS API &mdash; DATA CACHED ON POSTGRESQL
    </div>
  </footer>
</body>
</html>
